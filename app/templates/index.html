<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖北移动运维知识助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">运维知识助手 (RAG)</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">问答系统</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/finetune">模型微调(Ollama)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/finetune_board">训练看板</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/eval_report">评估报告</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3" style="height: 100vh; display: flex; flex-direction: column;">
        <h2 class="text-center mb-3">🛠️ 湖北移动知识库问答排障系统</h2>
        <div class="row flex-grow-1 overflow-hidden">
            <!-- 左侧：知识库管理与状态 -->
            <div class="col-md-4 d-flex flex-column h-100 overflow-auto pr-2">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">知识库构建</h5>
                    </div>
                    <div class="card-body py-2">
                        <form id="uploadForm">
                            <div class="mb-2">
                                <label for="dbNameSelect" class="form-label">选择知识库 (Collection)</label>
                                <select class="form-select mb-2" id="dbNameSelect" name="db_name">
                                    <option value="default" selected>默认库 (default)</option>
                                    <option value="network_faults">网络故障库</option>
                                    <option value="device_manuals">设备手册库</option>
                                    <option value="operation_logs">运维日志库</option>
                                    <option value="model_lib">模型库</option>
                                </select>
                                <label for="fileInput" class="form-label">上传运维手册/案例 (支持 PDF/Word/TXT/MD/图片)</label>
                                <!-- 将文件选择框隐藏，使用按钮触发，方便自定义管理列表 -->
                                <input class="form-control d-none" type="file" id="fileInput" accept=".pdf,.docx,.txt,.md,.png,.jpg,.jpeg" multiple>
                                <button type="button" class="btn btn-sm btn-outline-secondary w-100 mb-2" onclick="$('#fileInput').click()">
                                    + 添加文件
                                </button>
                                <div id="selectedFilesList" class="mt-1 text-muted" style="font-size: 0.8rem; max-height: 80px; overflow-y: auto;">
                                    <!-- 动态生成待上传文件列表 -->
                                </div>
                            </div>
                            <button type="submit" class="btn btn-sm btn-success w-100" id="uploadBtn">
                                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                上传并解析
                            </button>
                        </form>
                        <div id="uploadStatus" class="alert alert-secondary mt-2 py-1 px-2" style="display: none; max-height: 60px; overflow-y: auto; font-size: 0.8rem;"></div>
                        <hr class="my-2">
                        <h6 class="mb-1">已有文档管理</h6>
                        <div class="input-group input-group-sm mb-1">
                            <select class="form-select" id="documentSelect">
                                <option value="" selected>请选择要删除的文档...</option>
                            </select>
                            <button class="btn btn-danger" type="button" id="deleteBtn">删除</button>
                        </div>
                        <div id="deleteStatus" class="alert alert-secondary mt-1 py-1 px-2" style="display: none; font-size: 0.8rem;"></div>
                    </div>
                </div>
                
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light py-2">
                        <h6 class="mb-0">查询控制 (可多选)</h6>
                    </div>
                    <div class="card-body py-2">
                        <div class="d-flex flex-wrap gap-2">
                            <div class="form-check">
                                <input class="form-check-input db-checkbox" type="checkbox" value="default" id="dbDefault" checked>
                                <label class="form-check-label" style="font-size: 0.85rem;" for="dbDefault">默认库</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input db-checkbox" type="checkbox" value="network_faults" id="dbNetwork">
                                <label class="form-check-label" style="font-size: 0.85rem;" for="dbNetwork">网络库</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input db-checkbox" type="checkbox" value="device_manuals" id="dbDevice">
                                <label class="form-check-label" style="font-size: 0.85rem;" for="dbDevice">设备库</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input db-checkbox" type="checkbox" value="operation_logs" id="dbLogs">
                                <label class="form-check-label" style="font-size: 0.85rem;" for="dbLogs">日志库</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input db-checkbox" type="checkbox" value="model_lib" id="dbModelLib">
                                <label class="form-check-label" style="font-size: 0.85rem;" for="dbModelLib">模型库</label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card shadow-sm mb-3 flex-grow-1">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center py-2">
                        <h6 class="mb-0">系统状态</h6>
                        <button class="btn btn-xs btn-outline-danger" style="font-size: 0.75rem; padding: 0.1rem 0.4rem;" onclick="clearSystemData()">清空数据</button>
                    </div>
                    <div class="card-body py-2" style="font-size: 0.85rem;">
                        <p class="mb-1">文档数: <span id="docCount">-</span></p>
                        <p class="mb-2">索引状态: <span id="indexStatus" class="badge bg-success">正常</span></p>
                        <hr class="my-2">
                        <h6 class="mb-1" style="font-size: 0.85rem;">模型切换 (当前: <span id="currentModelBadge" class="badge bg-info text-wrap" style="font-size: 0.75rem;"></span>)</h6>
                        <div class="input-group input-group-sm mb-2">
                            <select class="form-select" id="llmCategorySelect">
                                <option value="online" selected>在线模型</option>
                                <option value="ollama">本地模型 (Ollama)</option>
                                <option value="vllm">本地模型 (vLLM)</option>
                            </select>
                        </div>
                        <div class="input-group mb-2" id="llmModelGroup">
                            <select class="form-select form-select-sm" id="llmModelSelect">
                                <option value="">加载中...</option>
                            </select>
                        </div>
                        <button class="btn btn-sm btn-outline-primary w-100" type="button" id="switchModelBtn">应用切换</button>
                        <small class="text-muted mt-1 d-block" id="modelSwitchStatus"></small>
                    </div>
                </div>
            </div>

            <!-- 右侧：智能问答 -->
            <div class="col-md-8 d-flex flex-column h-100 overflow-hidden">
                <div class="card shadow-sm flex-grow-1 d-flex flex-column mb-3" style="min-height: 0;">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center py-2">
                        <h6 class="mb-0">智能问答</h6>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearChat()">清空对话</button>
                    </div>
                    <div class="card-body d-flex flex-column p-2" style="min-height: 0;">
                        <div id="chatHistory" class="flex-grow-1 overflow-auto mb-2 p-2 border rounded bg-light" style="min-height: 0;">
                            <!-- 欢迎消息 -->
                            <div class="d-flex flex-row justify-content-start mb-2">
                                <div class="p-2 bg-white border rounded shadow-sm" style="max-width: 85%;">
                                    <p class="mb-0" style="font-size: 0.9rem;">您好！我是湖北移动运维助手。请问有什么故障需要排查？</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <input type="text" id="queryInput" class="form-control" placeholder="请输入故障现象或问题..." aria-label="Query">
                            <button class="btn btn-primary" type="button" id="sendBtn">发送</button>
                            <button class="btn btn-danger d-none" type="button" id="stopBtn">终止</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
