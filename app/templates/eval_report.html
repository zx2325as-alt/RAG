<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练后评估报告 - 湖北移动运维知识助手</title>
    <link href="/static/vendor/css/bootstrap.min.css" rel="stylesheet">
    <script src="/static/vendor/js/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .metric-card { border-left: 4px solid #0d6efd; }
        .heatmap-cell { width: 40px; height: 40px; text-align: center; vertical-align: middle; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">运维知识助手 (RAG)</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">问答系统</a></li>
                    <li class="nav-item"><a class="nav-link" href="/finetune">模型微调(Ollama)</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/eval_report">评估报告</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">训练后评估报告</h3>
            <div class="d-flex">
                <select id="modelSelect" class="form-select me-2" style="width: 250px;">
                    <option value="">请选择微调模型...</option>
                </select>
                <button id="loadReportBtn" class="btn btn-primary">生成报告</button>
            </div>
        </div>

        <div id="alertContainer" class="d-none mb-4"></div>

        <div id="reportContainer" style="display: none;">
            <!-- 核心指标 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm metric-card">
                        <div class="card-body">
                            <h6 class="text-muted">评估损失 (Eval Loss)</h6>
                            <h3 id="metricLoss">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm metric-card" style="border-left-color: #198754;">
                        <div class="card-body">
                            <h6 class="text-muted">ROUGE-L</h6>
                            <h3 id="metricRouge">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm metric-card" style="border-left-color: #ffc107;">
                        <div class="card-body">
                            <h6 class="text-muted">BLEU Score</h6>
                            <h3 id="metricBleu">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm metric-card" style="border-left-color: #dc3545;">
                        <div class="card-body">
                            <h6 class="text-muted">推理吞吐 (Samples/s)</h6>
                            <h3 id="metricSpeed">-</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <!-- 静态评估报告图表展示 -->
                <div class="col-md-12" id="staticImagesCol">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">评估图表展示 (直接读取系统输出图片)</h5>
                        </div>
                        <div class="card-body">
                            <div class="row" id="staticImagesContainer">
                                <!-- 动态插入 base64 图片 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <!-- 训练损失曲线 (动态渲染，如果不存在则隐藏) -->
                <div class="col-md-12 d-none" id="chartCol">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">损失曲线 (Loss)</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="lossChart" style="max-height: 400px;"></canvas>
                        </div>
                    </div>
                </div>
                <!-- 混淆矩阵 (默认隐藏) -->
                <div class="col-md-5 d-none" id="cmCol">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">混淆矩阵 (错误分类分析)</h5>
                        </div>
                        <div class="card-body text-center overflow-auto">
                            <table class="table table-bordered table-sm mt-3 mx-auto" style="width: auto;">
                                <thead id="cmHead"></thead>
                                <tbody id="cmBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 生成样例对比 -->
            <div class="card shadow-sm mb-4 d-none" id="samplesCard">
                <div class="card-header bg-white">
                    <h5 class="mb-0">生成样例对比测试</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 25%">输入 (Instruction)</th>
                                <th style="width: 30%">参考答案 (Reference)</th>
                                <th style="width: 35%">模型预测 (Predict)</th>
                                <th style="width: 10%">状态</th>
                            </tr>
                        </thead>
                        <tbody id="samplesTableBody">
                            <!-- 动态填充 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/js/jquery-3.6.0.min.js"></script>
    <script src="/static/vendor/js/bootstrap.bundle.min.js"></script>
    <script>
        let lossChartInstance = null;

        $(document).ready(function() {
            // 加载模型列表
            $.get('/finetuned_models_list', function(res) {
                var select = $('#modelSelect');
                if (res.models && res.models.length > 0) {
                    res.models.forEach(function(m) {
                        select.append(`<option value="${m}">${m}</option>`);
                    });
                }
            });

            $('#loadReportBtn').click(function() {
                var modelName = $('#modelSelect').val();
                if (!modelName) {
                    alert('请先选择一个模型');
                    return;
                }
                
                var btn = $(this);
                btn.prop('disabled', true).text('加载中...');
                
                $.get('/api/eval_data?model_name=' + modelName, function(data) {
                    btn.prop('disabled', false).text('生成报告');
                    
                    if (data.metrics && data.metrics.status) {
                        $('#alertContainer').removeClass('d-none').html('<div class="alert alert-warning">' + data.metrics.status + '</div>');
                        $('#reportContainer').hide();
                        return; // 结束渲染
                    } else {
                        $('#alertContainer').addClass('d-none');
                    }
                    
                    $('#reportContainer').fadeIn();
                    
                    // 填充核心指标
                    var m = data.metrics || {};
                    var loss = m.eval_loss || m.train_loss || m.predict_loss;
                    var rouge = m.eval_rougeL || m.predict_rougeL || m.eval_rouge || m.predict_rouge;
                    var bleu = m.eval_bleu || m.predict_bleu;
                    var speed = m.eval_samples_per_second || m.predict_samples_per_second;
                    
                    $('#metricLoss').text(loss ? parseFloat(loss).toFixed(4) : 'N/A');
                    $('#metricRouge').text(rouge ? parseFloat(rouge).toFixed(2) : 'N/A');
                    $('#metricBleu').text(bleu ? parseFloat(bleu).toFixed(2) : 'N/A');
                    $('#metricSpeed').text(speed ? parseFloat(speed).toFixed(2) : 'N/A');
                    
                    // 渲染系统生成的静态评估图片
                    if (data.images && Object.keys(data.images).length > 0) {
                        $('#staticImagesCol').removeClass('d-none');
                        var imgContainer = $('#staticImagesContainer');
                        imgContainer.empty();
                        for (var key in data.images) {
                            var imgHtml = `
                            <div class="col-md-4 text-center mb-3">
                                <h6>${key}</h6>
                                <img src="${data.images[key]}" class="img-fluid border rounded" alt="${key}" style="max-height: 300px; cursor: pointer;" onclick="window.open(this.src)">
                            </div>
                            `;
                            imgContainer.append(imgHtml);
                        }
                    } else {
                        $('#staticImagesCol').addClass('d-none');
                    }
                    
                    // 绘制 Loss 曲线 (如果没有静态图片则尝试动态渲染)
                    var datasets = [];
                    var allSteps = new Set();
                    
                    if (data.loss_history && data.loss_history.length > 0) {
                        data.loss_history.forEach(x => allSteps.add(x.step));
                        datasets.push({
                            label: 'Train Loss',
                            data: data.loss_history.map(x => ({x: x.step, y: x.loss})),
                            borderColor: 'rgba(13, 110, 253, 1)',
                            backgroundColor: 'rgba(13, 110, 253, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: false
                        });
                    }
                    
                    if (data.eval_loss_history && data.eval_loss_history.length > 0) {
                        data.eval_loss_history.forEach(x => allSteps.add(x.step));
                        datasets.push({
                            label: 'Eval Loss',
                            data: data.eval_loss_history.map(x => ({x: x.step, y: x.loss})),
                            borderColor: 'rgba(220, 53, 69, 1)',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: false
                        });
                    }
                    
                    if (datasets.length > 0) {
                        $('#chartCol').removeClass('d-none');
                        if (lossChartInstance) {
                            lossChartInstance.destroy();
                        }
                        
                        var stepsArray = Array.from(allSteps).sort((a, b) => a - b);
                        
                        var ctx = document.getElementById('lossChart').getContext('2d');
                        lossChartInstance = new Chart(ctx, {
                            type: 'line',
                            data: {
                                datasets: datasets
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { display: true } },
                                scales: { 
                                    x: { type: 'linear', title: { display: true, text: 'Step' }, min: 0 }, 
                                    y: { title: { display: true, text: 'Loss' } } 
                                }
                            }
                        });
                    }
                    
                    // 渲染混淆矩阵
                    if (data.confusion_matrix) {
                        $('#chartCol').removeClass('col-md-12').addClass('col-md-7');
                        $('#cmCol').removeClass('d-none');
                        var cm = data.confusion_matrix;
                        var headHtml = '<tr><th>真实\\预测</th>';
                        cm.labels.forEach(l => headHtml += `<th>${l}</th>`);
                        headHtml += '</tr>';
                        $('#cmHead').html(headHtml);
                        
                        var bodyHtml = '';
                        cm.matrix.forEach((row, i) => {
                            bodyHtml += `<tr><th>${cm.labels[i]}</th>`;
                            row.forEach(val => {
                                // 简单的热力图颜色映射
                                var alpha = Math.min(val / 50, 1);
                                var bg = `rgba(13, 110, 253, ${alpha})`;
                                var color = alpha > 0.5 ? 'white' : 'black';
                                bodyHtml += `<td class="heatmap-cell" style="background-color: ${bg}; color: ${color};">${val}</td>`;
                            });
                            bodyHtml += '</tr>';
                        });
                        $('#cmBody').html(bodyHtml);
                    } else {
                        $('#chartCol').removeClass('col-md-7').addClass('col-md-12');
                        $('#cmCol').addClass('d-none');
                    }
                    
                    // 渲染样例对比
                    if (data.samples && data.samples.length > 0) {
                        $('#samplesCard').removeClass('d-none');
                        var tbody = $('#samplesTableBody');
                        tbody.empty();
                        data.samples.forEach(function(s) {
                            var statusBadge = s.status === '正确' ? 'bg-success' : (s.status === '待定' ? 'bg-secondary' : 'bg-danger');
                            var row = `
                                <tr>
                                    <td><small>${s.instruction}</small></td>
                                    <td><small class="text-muted">${s.reference}</small></td>
                                    <td><small>${s.predict}</small></td>
                                    <td><span class="badge ${statusBadge}">${s.status}</span></td>
                                </tr>
                            `;
                            tbody.append(row);
                        });
                    } else {
                        $('#samplesCard').addClass('d-none');
                    }
                }).fail(function() {
                    btn.prop('disabled', false).text('生成报告');
                    $('#alertContainer').removeClass('d-none').html('<div class="alert alert-danger">获取评估数据失败，可能是该模型尚未完成评估或目录不存在。</div>');
                    $('#reportContainer').hide();
                });
            });
        });
    </script>
</body>
</html>
