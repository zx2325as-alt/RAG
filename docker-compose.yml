version: '3.8'

services:
  # 1. 基础中间件服务123123
  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - rag_net

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rag_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rag_net

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - rag_net

  # 2. 核心推理服务 (Flask)
  embedding_service:
    build: 
      context: ./services/embedding
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./model:/app/model
    environment:
      - EMBEDDING_MODEL_PATH=/app/model/bge-large-zh
    networks:
      - rag_net

  rerank_service:
    build: 
      context: ./services/rerank
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    volumes:
      - ./model:/app/model
    environment:
      - RERANK_MODEL_PATH=/app/model/bge-reranker-large
    networks:
      - rag_net

  # 3. 业务微服务
  qa_api:
    build:
      context: ./services/qa_api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EMBEDDING_SERVICE_URL=http://embedding_service:5001/embed
      - RERANK_SERVICE_URL=http://rerank_service:5002/rerank
      - LLM_SERVICE_URL=http://host.docker.internal:8000/v1/chat/completions # 假设 vLLM 跑在宿主机
    depends_on:
      - redis
      - embedding_service
      - rerank_service
    networks:
      - rag_net

  doc_parser_worker:
    build:
      context: ./services/doc_parser
      dockerfile: Dockerfile
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - rabbitmq
      - redis
    command: celery -A tasks worker --loglevel=info
    networks:
      - rag_net

volumes:
  redis_data:
  mysql_data:
  minio_data:

networks:
  rag_net:
    driver: bridge